<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Anvaye</title>
  <meta name="description" content="Oops! The page you're looking for doesn't exist." />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />

  <style>
    body {
      background:      var(--bg-dark);
      min-height:      100vh;
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      padding:         40px 24px;
      text-align:      center;
      position:        relative;
      overflow:        hidden;
    }

    body::before {
      content:   '';
      position:  absolute;
      inset:     0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(255,92,43,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(29,158,117,0.08) 0%, transparent 60%);
    }

    body::after {
      content:    '';
      position:   absolute;
      inset:      0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events:  none;
    }

    .error-wrap {
      position:   relative;
      z-index:    1;
      max-width:  560px;
      animation:  fadeUp 0.6s ease;
    }

    .error-num {
      font-size:   120px;
      font-weight: 800;
      line-height: 1;
      background:              linear-gradient(135deg, var(--brand), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip:         text;
      margin-bottom:           8px;
      animation:               pulse-glow 3s infinite;
    }

    .error-title {
      font-size:     32px;
      font-weight:   800;
      color:         #fff;
      margin-bottom: 16px;
    }

    .error-sub {
      font-size:     17px;
      color:         rgba(255,255,255,0.5);
      line-height:   1.7;
      margin-bottom: 40px;
    }

    .error-actions {
      display:         flex;
      gap:             16px;
      justify-content: center;
      flex-wrap:       wrap;
      margin-bottom:   48px;
    }

    .error-links {
      display:        flex;
      flex-direction: column;
      gap:            12px;
      align-items:    center;
    }

    .error-links-title {
      font-size:      11px;
      font-weight:    600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color:          rgba(255,255,255,0.3);
      margin-bottom:  4px;
    }

    .error-link {
      display:         inline-flex;
      align-items:     center;
      gap:             8px;
      font-size:       14px;
      font-weight:     500;
      color:           rgba(255,255,255,0.5);
      transition:      color var(--speed);
      text-decoration: none;
    }

    .error-link:hover { color: var(--brand); }

    .error-logo {
      font-size:       24px;
      font-weight:     800;
      color:           var(--brand);
      margin-bottom:   48px;
      display:         block;
      text-decoration: none;
    }

    .orb {
      position:       absolute;
      border-radius:  50%;
      filter:         blur(60px);
      pointer-events: none;
      animation:      float 6s ease-in-out infinite;
    }

    .orb-1 {
      width:           300px;
      height:          300px;
      background:      rgba(255,92,43,0.08);
      top:             -100px;
      left:            -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width:           200px;
      height:          200px;
      background:      rgba(29,158,117,0.08);
      bottom:          -60px;
      right:           -60px;
      animation-delay: 2s;
    }

    .orb-3 {
      width:           150px;
      height:          150px;
      background:      rgba(239,159,39,0.06);
      top:             40%;
      right:           10%;
      animation-delay: 4s;
    }

    .auto-redirect {
      font-size:  13px;
      color:      rgba(255,255,255,0.3);
      margin-top: 24px;
    }

    .countdown {
      color:       var(--brand);
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .error-num     { font-size: 80px; }
      .error-title   { font-size: 24px; }
      .error-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="error-wrap">

    <a href="index.html" class="error-logo">Anvaye</a>

    <div class="error-num">404</div>

    <div class="error-title">Page not found</div>

    <div class="error-sub">
      Looks like this page went on a wish-list of its own
      and got lost along the way. Let's get you back on track.
    </div>

    <div class="error-actions">
      <a href="index.html" class="btn btn-primary btn-lg">
        <i class="ti ti-home"></i>
        Back to home
      </a>
      <a href="buyer/index.html" class="btn btn-dark btn-lg">
        Start shopping
      </a>
    </div>

    <div class="error-links">
      <div class="error-links-title">Or go to</div>
      <a href="how-it-works.html" class="error-link">
        <i class="ti ti-info-circle"></i>
        How it works
      </a>
      <a href="pricing.html" class="error-link">
        <i class="ti ti-currency-rupee"></i>
        Pricing
      </a>
      <a href="faq.html" class="error-link">
        <i class="ti ti-help-circle"></i>
        FAQ
      </a>
      <a href="seller/index.html" class="error-link">
        <i class="ti ti-store"></i>
        Sell on Anvaye
      </a>
      <a href="index.html#contact" class="error-link">
        <i class="ti ti-mail"></i>
        Contact support
      </a>
    </div>

    <div class="auto-redirect">
      Redirecting to home in
      <span class="countdown" id="countdown">10</span>s
    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    let seconds = 10;
    const countdownEl = document.getElementById('countdown');

    const currentPath = window.location.pathname;
    const origin      = window.location.origin;

    // Detect GitHub Pages subfolder
    const isGitHub = window.location.hostname.includes('github.io');
    const base     = isGitHub ? '/anvaye' : '';

    if (currentPath.includes('/buyer')) {
      window.location.replace(origin + base + '/buyer/index.html');
    } else if (currentPath.includes('/seller')) {
      window.location.replace(origin + base + '/seller/index.html');
    } else if (currentPath.includes('/how-it-works')) {
      window.location.replace(origin + base + '/how-it-works.html');
    } else if (currentPath.includes('/pricing')) {
      window.location.replace(origin + base + '/pricing.html');
    } else if (currentPath.includes('/faq')) {
      window.location.replace(origin + base + '/faq.html');
    } else {
      /* Unknown path — show countdown and redirect to home */
      const timer = setInterval(() => {
        seconds--;
        if (countdownEl) countdownEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = origin + base + '/index.html';
        }
      }, 1000);
    }
  </script>

</body>
</html>
